# Evaluation environment. Full machine-agnostic setup (shared modules, LLM stack,
# per-baseline config incl. the separate DAAAM env) is in docs/SETUP.md.
# NOTE: the two `-e /home/robin_wang/<repo>` lines are LOCAL-PATH baseline repos
# (ClawS, HOV-SG) — only needed to run those baselines. For the benchmark evaluators
# + the auto-designed memory alone they are NOT required. On a new machine, clone
# those repos (docs/SETUP.md Layer 3) and edit the paths, or remove these lines.
name: spatial-memory-eval
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy=1.26
  - scipy>=1.10
  - pyyaml>=5.4
  - pillow>=10
  - tqdm>=4.66
  - pip:
      # --- core evaluator deps (always needed) ---
      - sqlite-vec>=0.1.6
      - aiohttp>=3.9
      - lz4>=4.3
      - openai==1.3.7
      - tenacity==8.2.3
      - opencv-python==4.9.0.80
      - imageio==2.34.0
      - pypng==0.20220715
      - matplotlib==3.8.0
      - natsort==8.4.0
      - torch>=2.2
      - transformers>=4.40
      - sentence-transformers>=3.0
      - ultralytics>=8.2
      # --- baseline repos (LOCAL PATHS; optional — see docs/SETUP.md Layer 3) ---
      - -e /home/robin_wang/ClawS-SpatialRAG      # ClawS baseline
      - -e /home/robin_wang/HOV-SG                # HOV-SG baseline
      - git+https://github.com/facebookresearch/segment-anything.git  # HOV-SG dep
      - torchmetrics>=1.4                          # HOV-SG dep
      - pyvista>=0.48                              # HOV-SG dep
      - scikit-fmm>=2025.6.23                      # HOV-SG dep
      - pathos>=0.3.3                              # HOV-SG dep
